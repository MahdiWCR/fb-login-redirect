<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <style>
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 48px 24px; }
    .btn { display: inline-block; margin-top: 16px; padding: 14px 28px; background: #1877F2; color: white; text-decoration: none; border-radius: 8px; font-size: 16px; }
    .btn:hover { background: #166FE5; }
  </style>
</head>
<body>
  <p id="msg">Redirecting back to app...</p>
  <a id="btn" class="btn" href="#" style="display: none;">Open app</a>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var appId = params.get('app_id');
      var hash = location.hash || '';
      var url = appId ? ('fb' + appId + '://authorize' + hash) : '';
      if (url) {
        var ua = navigator.userAgent.toLowerCase();
        var isIOS = /iphone|ipad|ipod/.test(ua);
        if (isIOS) {
          document.getElementById('msg').textContent = 'Tap the button below to return to the app.';
          var btn = document.getElementById('btn');
          btn.href = url;
          btn.style.display = 'inline-block';
        } else {
          location.replace(url);
        }
      } else {
        document.getElementById('msg').textContent = 'Error: app_id query parameter required.';
      }
    })();
  </script>
</body>
</html>
