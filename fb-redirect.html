<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting back to app...</p>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var appId = params.get('app_id');
      var hash = location.hash || '';
      if (appId) {
        location.replace('fb' + appId + '://authorize' + hash);
      } else {
        document.body.innerHTML = '<p>Error: app_id query parameter required.</p>';
      }
    })();
  </script>
</body>
</html>
